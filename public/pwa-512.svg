<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="mcb512-bg" x1="64" y1="32" x2="480" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="mcb512-hi" x1="256" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bookmark-grad-512" x1="420" y1="48" x2="420" y2="208" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>
    <filter id="glow-512">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow-512">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0d9488" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#mcb512-bg)"/>
  <rect width="512" height="512" rx="128" fill="url(#mcb512-hi)"/>

  <!-- Bookmark top right -->
  <g filter="url(#shadow-512)">
    <path d="M400 48v160l32-32 32 32V48c0-8.8-7.2-16-16-16h-32c-8.8 0-16 7.2-16 16z" fill="url(#bookmark-grad-512)"/>
    <path d="M432 65v128l-16-16-16 16V65" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Car silhouette - minimalist front view -->
  <g fill="#ffffff" filter="url(#glow-512)">
    <!-- Car body outline - rounded top -->
    <path d="M80 224c0-64 48-112 112-112h128c64 0 112 48 112 112v128H80v-128z"/>

    <!-- Grille - horizontal rectangle -->
    <rect x="144" y="240" width="224" height="80" rx="16"/>

    <!-- Badge/emblem in center of grille -->
    <ellipse cx="256" cy="280" rx="48" ry="29"/>

    <!-- Headlights -->
    <circle cx="112" cy="256" r="24"/>
    <circle cx="400" cy="256" r="24"/>
  </g>

  <!-- Lower bumper area -->
  <rect x="160" y="336" width="192" height="16" rx="6" fill="#ffffff" fill-opacity="0.7"/>
  <rect x="192" y="352" width="128" height="8" rx="3" fill="#ffffff" fill-opacity="0.4"/>
  <rect x="224" y="360" width="64" height="4" rx="1" fill="#ffffff" fill-opacity="0.25"/>

  <!-- Subtle side details -->
  <rect x="64" y="280" width="16" height="48" rx="6" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="432" y="280" width="16" height="48" rx="6" fill="#ffffff" fill-opacity="0.2"/>
</svg>

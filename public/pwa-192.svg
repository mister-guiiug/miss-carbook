<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="mcb192-bg" x1="24" y1="12" x2="180" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="mcb192-hi" x1="96" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bookmark-grad-192" x1="156" y1="18" x2="156" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>
    <filter id="glow-192">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="48" fill="url(#mcb192-bg)"/>
  <rect width="192" height="192" rx="48" fill="url(#mcb192-hi)"/>

  <!-- Bookmark top right -->
  <path d="M150 18v60l12-12 12 12V18c0-3.3-2.7-6-6-6h-12c-3.3 0-6 2.7-6 6z" fill="url(#bookmark-grad-192)"/>
  <path d="M162 25v48l-6-6-6 6V25" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Car silhouette - minimalist front view -->
  <g fill="#ffffff" filter="url(#glow-192)">
    <!-- Car body outline - rounded top -->
    <path d="M30 84c0-24 18-42 42-42h48c24 0 42 18 42 42v48H30v-48z"/>

    <!-- Grille - horizontal rectangle -->
    <rect x="54" y="90" width="84" height="30" rx="6"/>

    <!-- Badge/emblem in center of grille -->
    <ellipse cx="96" cy="105" rx="18" ry="11"/>

    <!-- Headlights -->
    <circle cx="42" cy="96" r="9"/>
    <circle cx="150" cy="96" r="9"/>
  </g>

  <!-- Lower bumper -->
  <rect x="60" y="126" width="72" height="6" rx="2" fill="#ffffff" fill-opacity="0.6"/>
  <rect x="72" y="132" width="48" height="3" rx="1" fill="#ffffff" fill-opacity="0.3"/>
</svg>

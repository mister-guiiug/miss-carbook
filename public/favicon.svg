<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="192" height="192" fill="none">
  <defs>
    <linearGradient id="mcb-bg" x1="4" y1="2" x2="30" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="mcb-hi" x1="16" y1="0" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bookmark-grad" x1="26" y1="3" x2="26" y2="13" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#mcb-bg)"/>
  <rect width="32" height="32" rx="8" fill="url(#mcb-hi)"/>

  <!-- Bookmark top right -->
  <path d="M25 3v11l2-2 2 2V3c0-0.55-0.45-1-1-1h-2c-0.55 0-1 0.45-1 1z" fill="url(#bookmark-grad)"/>
  <path d="M26 5v8l-1-1-1 1V5" fill="none" stroke="#0f766e" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Car silhouette - minimalist front view -->
  <g fill="#ffffff">
    <!-- Car body outline - rounded top -->
    <path d="M5 14c0-4 3-7 7-7h8c4 0 7 3 7 7v8H5v-8z"/>

    <!-- Grille - horizontal rectangle -->
    <rect x="9" y="15" width="14" height="5" rx="1"/>

    <!-- Badge/emblem in center of grille -->
    <ellipse cx="16" cy="17.5" rx="3" ry="1.8"/>

    <!-- Headlights -->
    <circle cx="7" cy="16" r="1.5"/>
    <circle cx="25" cy="16" r="1.5"/>
  </g>

  <!-- Lower bumper -->
  <rect x="10" y="21" width="12" height="1.5" rx="0.5" fill="#ffffff" fill-opacity="0.5"/>
</svg>

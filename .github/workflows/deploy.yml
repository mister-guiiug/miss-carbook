# Déploiement GitHub Pages avec migrations Supabase préalables.
# Utilise la composite action setup-pwa pour le checkout/setup-node/install.
# Le job migrate reste custom (Supabase CLI).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Migrations Supabase ─────────────────────────────────────────────────────
  # Secrets à définir dans Settings > Secrets > Actions :
  #   SUPABASE_ACCESS_TOKEN  : token personnel  https://supabase.com/dashboard/account/tokens
  #   SUPABASE_PROJECT_ID    : ref du projet    (slug dans l'URL du dashboard)
  #   SUPABASE_DB_PASSWORD   : mot de passe DB  (défini à la création du projet)
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: mister-guiiug/dev-wpa-config/.github/actions/supabase-migrate@v1
        with:
          access-token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          project-id: ${{ secrets.SUPABASE_PROJECT_ID }}
          db-password: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ── Build frontend ──────────────────────────────────────────────────────────
  build:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: mister-guiiug/dev-wpa-config/.github/actions/setup-pwa@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_PUBLIC_SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
